# MySQL for local dev. Host port 3307 avoids "Bind for 0.0.0.0:3306 failed" when
# another MySQL or container already uses 3306. Point DATABASE_URL at localhost:3307.
version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: earthworm_dev
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"